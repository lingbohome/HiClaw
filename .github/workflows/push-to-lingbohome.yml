name: Push to lingbohome Registry

# Build + push HiClaw worker images to lingbohome's Alibaba Cloud registry.
# Mirrors the main build.yml but targets a personal registry.
# Triggered manually from https://github.com/lingbohome/HiClaw/actions.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  REPO: lingbohome
  # Overseas mirror for base images (accessible from GitHub Actions runners)
  HIGRESS_REGISTRY: higress-registry.us-west-1.cr.aliyuncs.com

jobs:
  # ── Base image first ─────────────────────────────────────────────────
  base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (patch branch)
        uses: actions/checkout@v4
        with:
          ref: patch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push openclaw-base
        run: |
          make push-openclaw-base \
            VERSION=${{ github.event.inputs.version || 'latest' }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            MULTIARCH_PLATFORMS=linux/amd64 \
            HIGRESS_REGISTRY=${{ env.HIGRESS_REGISTRY }}

  # ── Controller (after base, needed by workers) ──────────────────────
  controller:
    needs: base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (patch branch)
        uses: actions/checkout@v4
        with:
          ref: patch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push hiclaw-controller
        run: |
          TAG="${{ github.event.inputs.version || 'latest' }}"
          make push-hiclaw-controller \
            VERSION="${TAG}" \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            MULTIARCH_PLATFORMS=linux/amd64 \
            DOCKER_BUILD_ARGS="--build-arg APT_MIRROR="

  # ── Worker images (parallel, after base + controller) ────────────────
  workers:
    needs: [base, controller]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - push-worker
          - push-copaw-worker
          - push-hermes-worker
          - push-manager

    steps:
      - name: Checkout (patch branch)
        uses: actions/checkout@v4
        with:
          ref: patch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push ${{ matrix.target }}
        run: |
          TAG="${{ github.event.inputs.version || 'latest' }}"
          MAKE_OPTS=""
          if [ "${{ matrix.target }}" = "push-manager" ]; then
            # push-manager depends on push-hiclaw-controller in Makefile.
            # Controller was already built by the controller job above — skip the redundant build.
            MAKE_OPTS="-o push-hiclaw-controller"
          fi
          make ${MAKE_OPTS} ${{ matrix.target }} \
            VERSION="${TAG}" \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            MULTIARCH_PLATFORMS=linux/amd64 \
            OPENCLAW_BASE_VERSION="${TAG}" \
            CONTROLLER_TAG=${{ env.REGISTRY }}/${{ env.REPO }}/hiclaw-controller:${TAG} \
            HIGRESS_REGISTRY=${{ env.HIGRESS_REGISTRY }} \
            DOCKER_BUILD_ARGS="--build-arg APT_MIRROR= --build-arg PIP_INDEX_URL=https://pypi.org/simple/"
